<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raphael Ultimate Skill</title>
    <style>
       
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            height: 100dvh;
            display: flex;
            flex-direction: column; 
        }

        /* The Hamburger Menu Button */
        #open-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    z-index: 1100;
}
    #open-btn.hide {
    display: none;
    }
        /* Sidebar styling - Now set to float and hide! */
        #sidebar {
            height: 100%;
            width: 250px;
            position: fixed; /* Makes it float over the page */
            top: 0;
            left: -250px; /* Hides it off the left side of the screen */
            background-color: #2c3e50;
            color: white;
            padding-top: 60px; /* Leaves space at the top */
            transition: 0.3s; /* Makes it slide smoothly */
            z-index: 1000; /* Keeps it on top of everything else */
            box-sizing: border-box;
        }
        #sidebar.open {
            left: 0; /* Slides it onto the screen */         }
        #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    display: none;
}

#overlay.show {
    display: block;
}   
   #background {
   background-color: red;
   flex: 1;
   display: flex;
   flex-direction: column;
   justify-content: flex-end; /* Bottom */
   align-items: center;        /* Center horizontally */
    padding-bottom: 5px;
   }
   #profilepic {
   background-color: gray;
   height: 100px;
   width: 100px;
   margin-bottom: 5px;
   margin-top: 5px;
   border-radius: 50px; 
   }
   h1 {
    margin: 0;
}
   #mainpic {
   background-color: yellow;
   flex: 4;
   }  

    </style>
</head>
<body>

  <div id="background">
  <div id="profilepic"></div>
  <h1> Raphael</h1>
 </div> 
 
 <div id="mainpic"></div>
 
     <div id="sidebar"></div>
     <div id="overlay" 
             onclick="closeMenu()">
       </div>
       <button id="open-btn"
             onclick="openMenu()"
       >☰</button>
     
    <script>
        function openMenu() {
            document.getElementById("sidebar").classList.add("open");
            document.getElementById("open-btn").classList.add("hide");
        document.getElementById("overlay").classList.add("show");
        }

        function closeMenu() {
            document.getElementById("sidebar").classList.remove("open");
        document.getElementById("overlay").classList.remove("show");
        document.getElementById("open-btn").classList.remove("hide");
        }
    </script>

</body>
</html>
