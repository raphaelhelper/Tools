<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raphael Ultimate Skill</title>
    <style>
       
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            height: 100dvh;
            display: flex;
            flex-direction: column; 
        }
        #open-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    z-index: 1100;
}
    #open-btn.hide {
    display: none;
    }
        /* Sidebar styling - Now set to float and hide! */
        #sidebar {
            height: 100%;
            width: 250px;
            position: fixed; /* Makes it float over the page */
            top: 0;
            left: -250px; /* Hides it off the left side of the screen */
            background-color: #2c3e50;
            color: white;
            padding-top: 60px; /* Leaves space at the top */
            transition: 0.3s; /* Makes it slide smoothly */
            z-index: 1000; /* Keeps it on top of everything else */
            box-sizing: border-box;
        }
        #sidebar.open {
            left: 0; /* Slides it onto the screen */         }
        #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    display: none;
}

#overlay.show {
    display: block;
}   
   #background {
   background-color: red;
   flex: 1;
   display: flex;
   flex-direction: column;
   justify-content: flex-end; /* Bottom */
   align-items: center;        /* Center horizontally */
    padding-bottom: 5px;
    background-image: url('Background_picture.png');
       background-size: cover;
       background-position: center;
       background-repeat: no-repeat;
   }
        
   #profilepic {

   height: 100px;
   width: 100px;
   margin-bottom: 0px;
   margin-top: 15px;
   border-radius: 50px; 
   }    
      #profilepic {
       /* Replace the image name with your actual file name */
       background-image: url('Profile_picture.png');
       background-size: cover;
       background-position: center;
       background-repeat: no-repeat;       
   }

   #mainpic {
       /* Replace the image name with your actual file name */
       background-image: url('Main_picture.png');
       background-size: cover;
       background-position: center;
       background-repeat: no-repeat;
       
       /* Your existing styles */
       flex: 4;
       width: 100%; /* Ensures it stretches across the screen */
   } 
     /* Add this inside your <style> tag */
#profileModal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.85); /* Dark background overlay */
    z-index: 2000; /* Ensures it sits on top of everything, including the sidebar */
    display: none; /* Hidden by default */
    justify-content: center;
    align-items: center;
}

#profileModal.show {
    display: flex; /* Flex is used here to easily center the image */
}

#bigProfilePic {
    width: 90%; 
    height: 90%;
    background-image: url('Profile_picture.png'); /* Uses the same image */
    background-size: contain; /* Ensures the entire image fits on screen without cropping */
    background-position: center;
    background-repeat: no-repeat;
}

        
    /* Targets tablets and desktop screens */
@media (min-width: 768px) {
    #mainpic {
        background-position: top; 
    }
}

    </style>
</head>
<body>

  <div id="background">
  <div id="profilepic" onclick="openProfileModal()"></div>

<div id="profileModal" onclick="closeProfileModal()">
    <div id="bigProfilePic"></div>
</div>

<img src="Title.png"
     alt="Raphael"
     width="100px"
     
     style="border-radius:10px;">
 </div> 
 
 <div id="mainpic"></div>
 
     <div id="sidebar"></div>
     <div id="overlay" 
             onclick="closeMenu()">
       </div>
       <button id="open-btn"
             onclick="openMenu()"
       >☰</button>
     
    <script>
        function openMenu() {
            document.getElementById("sidebar").classList.add("open");
            document.getElementById("open-btn").classList.add("hide");
        document.getElementById("overlay").classList.add("show");
        }

        function closeMenu() {
            document.getElementById("sidebar").classList.remove("open");
        document.getElementById("overlay").classList.remove("show");
        document.getElementById("open-btn").classList.remove("hide");
        }
        /* Add this inside your <script> tag */
function openProfileModal() {
    document.getElementById("profileModal").classList.add("show");
}

function closeProfileModal() {
    document.getElementById("profileModal").classList.remove("show");
}

    </script>

</body>
</html>
