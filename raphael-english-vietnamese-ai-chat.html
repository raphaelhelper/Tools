<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raphael – English-Vietnamese AI Chat</title>
    <style>
body {
    margin: 0;
    background-color: black;
    color: white;
    font-family: Arial, sans-serif;
}


#chat {
display: flex;
flex-direction: column;
padding-bottom: 80px;
overflow-wrap: break-word;
word-break: break-word;

}


#wrap {
    position: fixed;
    left: 16px;
    right: 16px;
    bottom: 16px;
    z-index: 1000;

    display: grid;
    grid-template-columns: 40px minmax(0, 1fr) 40px;
    grid-template-rows: 40px;
    align-items: center;
    gap: 8px;

    padding: 6px 8px;
    box-sizing: border-box;

    background-color: #212121;
    border-radius: 28px;
    transition: border-radius 0.2s, padding 0.2s;
}

#wrap * {
    box-sizing: border-box;
}

/* Home and send buttons */

.home-btn,
.send-btn {
    width: 40px;
    height: 40px;
    padding: 0;

    display: grid;
    place-items: center;

    border: none;
    border-radius: 50%;
    cursor: pointer;
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
}

.home-btn {
    grid-column: 1;
    grid-row: 1;
    background-color: transparent;
}

.home-btn svg {
    width: 22px;
    height: 22px;
    fill: #c4c7c5;
}

.send-btn {
    grid-column: 3;
    grid-row: 1;

    background-color: #ffffff;
    color: #111111;

    font-size: 24px;
    line-height: 1;
}

/* Textarea */

#t {
    grid-column: 2;
    grid-row: 1;

    width: 100%;
    height: 40px;
    min-height: 40px;
    max-height: 50dvh;

    margin: 0;
    padding: 8px 4px;

    background: transparent;
    color: #e3e3e3;
    caret-color: white;

    border: none;
    outline: none;
    resize: none;
    overflow-y: hidden;

    font-family: inherit;
    font-size: 16px;
    line-height: 24px;

    appearance: none;
    -webkit-appearance: none;
}

#t::placeholder {
    color: #8e918f;
}

/* =========================
   MULTILINE LAYOUT
========================= */

#wrap.multiline {
    grid-template-columns: 40px minmax(0, 1fr) 40px;
    grid-template-rows: auto 40px;
    align-items: end;
    column-gap: 8px;
    row-gap: 4px;

    padding: 8px 12px;
    border-radius: 24px;
}

/* Text becomes almost full width */

#wrap.multiline #t {
    grid-column: 1 / -1;
    grid-row: 1;

    width: 100%;
    margin: 0;
    padding: 8px 4px;
}

/* Buttons always remain at the bottom */

#wrap.multiline .home-btn {
    grid-column: 1;
    grid-row: 2;
}

#wrap.multiline .send-btn {
    grid-column: 3;
    grid-row: 2;
}

.home-btn:active,
.send-btn:active {
    transform: scale(0.94);
}





.you {
padding: 10px;
    background-color: #222222;
    border-radius: 10px;
 align-self: flex-end;
 max-width: 80%; 
margin-bottom: 10px;

    white-space: break-spaces;

}

.markdown > :first-child {
    margin-top: 0;
}

.markdown > :last-child {
    margin-bottom: 0;
}

.markdown pre {
    overflow-x: auto;
}

.markdown a {
    color: #8ab4f8;
}

.thinking {
    color: #aaa;
    font-style: italic;
    padding: 10px 0;
    animation: thinkingPulse 1s infinite alternate;
}

@keyframes thinkingPulse {
    from { opacity: 0.4; }
    to   { opacity: 1; }
}



    </style>
</head>
<body>

<div id="chat">
</div>


<div id="wrap">
    <a href="index.html" class="home-btn" aria-label="Home">
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 11L12 3L21 11V21H15V15H9V21H3Z"></path>
        </svg>
    </a>

    <textarea
        id="t"
        rows="1"
        placeholder="Message"
        aria-label="Message"
    ></textarea>

    <button
        type="button"
        class="send-btn"
        onclick="send()"
        aria-label="Send message"
    >
        ↑
    </button>
</div>




<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>

<script>
   const FUNCTION_URL =
    "https://pevwdrbyoeqjwfqqwipf.supabase.co/functions/v1/gemini-chat";
    const history = [];


async function callGemini(contents) {
    const response = await fetch(FUNCTION_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ contents })
    });

    const data = await response.json();

    if (!response.ok) {
        const message =
            data.error?.message ||
            data.error ||
            `Request failed (${response.status})`;

        throw new Error(message);
    }

    return data;
}


function renderMarkdown(text) {
    return DOMPurify.sanitize(marked.parse(text));
}


const wrap = document.getElementById("wrap");
const messageInput = document.getElementById("t");

function getSingleLineHeight() {
    const style = getComputedStyle(messageInput);

    return Math.ceil(
        parseFloat(style.lineHeight) +
        parseFloat(style.paddingTop) +
        parseFloat(style.paddingBottom)
    );
}

function resizeInput() {
    const singleLineHeight = getSingleLineHeight();

    /*
       Temporarily measure the text using the small layout.
       This prevents the layout from jumping backward and forward.
    */
    wrap.classList.remove("multiline");
    messageInput.style.height = singleLineHeight + "px";

    const needsMultiline =
        messageInput.scrollHeight > singleLineHeight + 1;

    wrap.classList.toggle("multiline", needsMultiline);

    /*
       Measure again after changing the textarea width,
       then grow it until it reaches 50% of the screen.
    */
    messageInput.style.height = singleLineHeight + "px";

    const requiredHeight = messageInput.scrollHeight;
    const maxHeight = Math.max(
        singleLineHeight,
        Math.floor(window.innerHeight * 0.5)
    );

    messageInput.style.height =
        Math.min(requiredHeight, maxHeight) + "px";

    messageInput.style.overflowY =
        requiredHeight > maxHeight ? "auto" : "hidden";
}

messageInput.addEventListener("input", resizeInput);
window.addEventListener("resize", resizeInput);

resizeInput();



function isVietnamese(text) {
    const normalizedText = text.normalize("NFC");

    return /[àáạảãâầấậẩẫăằắặẳẵèéẹẻẽêềếệểễìíịỉĩòóọỏõôồốộổỗơờớợởỡùúụủũưừứựửữỳýỵỷỹđ]/iu
        .test(normalizedText);
}


let isSending = false;

async function send() {
    if (isSending) return;

    const text = messageInput.value;

    if (!text.trim()) return;

    const vietnameseFirst = isVietnamese(text);

    isSending = true;

    try {
        const chat = document.getElementById("chat");

        // 1. Display the user's message
        const youMessage = document.createElement("div");
        youMessage.className = "you";
        youMessage.textContent = text;
        chat.appendChild(youMessage);

        // Save the user's message to conversation history
        history.push({
            role: "user",
            parts: [{ text: text }]
        });

        messageInput.value = "";
        resizeInput();

        // Show temporary waiting message
        const thinkingMessage = document.createElement("div");
        thinkingMessage.className = "bot thinking";
        thinkingMessage.textContent = "Thinking...";
        chat.appendChild(thinkingMessage);

        window.scrollTo(0, document.body.scrollHeight);

        try {
            // 2. First API call: Get Gemini's normal response
            const data1 = await callGemini(history);

            const reply1 =
                data1.candidates?.[0]?.content?.parts?.[0]?.text ||
                "Error occurred.";

            // Save Gemini's original response to history
            history.push({
                role: "model",
                parts: [{ text: reply1 }]
            });

            // 12 history items = approximately 6 user messages and 6 replies
            if (history.length >= 12) {
                try {
                    // Convert conversation history into readable text
                    const conversationText = history
                        .map(message => {
                            return `${message.role}: ${message.parts[0].text}`;
                        })
                        .join("\n");

                    // Create the summary request
                    const summaryPrompt = [
                        {
                            role: "user",
                            parts: [
                                {
                                    text:
                                        "Summarize this conversation briefly so we don't lose context:\n" +
                                        conversationText
                                }
                            ]
                        }
                    ];

                    // Ask Gemini to summarize the conversation
                    const summaryData = await callGemini(summaryPrompt);

                    const summaryReply =
                        summaryData.candidates?.[0]?.content?.parts?.[0]?.text ||
                        "Error generating summary.";

                    // Remove the old history
                    history.length = 0;

                    // Store the summary as the new conversation context
                    history.push({
                        role: "user",
                        parts: [
                            {
                                text:
                                    "Here is a summary of our chat so far:\n" +
                                    summaryReply
                            }
                        ]
                    });

                    history.push({
                        role: "model",
                        parts: [
                            {
                                text:
                                    "Understood! I will keep this context in mind. What's next?"
                            }
                        ]
                    });
                } catch (error) {
                    console.error("Summary failed:", error);
                }
            }

            // 3. Second API call: Translate Gemini's response
            const prompt = `Translate the following text sentence by sentence into this exact format:

en: [English sentence]
vi: [Vietnamese sentence]

Do not add an introduction, conclusion, explanation, code fence, or any other text.

Here is the text to translate:
${reply1}`;

            const data2 = await callGemini([
                {
                    role: "user",
                    parts: [{ text: prompt }]
                }
            ]);

            const reply2 =
                data2.candidates?.[0]?.content?.parts?.[0]?.text || "";

            // 4. Create the final bot message
            const botMessage = document.createElement("div");
            botMessage.className = "bot";

            // Accept:
            // en: Hello
            // vi: Xin chào
            //
            // Also accepts:
            // - en: Hello
            // **vi:** Xin chào
            const regex =
                /^\s*(?:[-+*]\s+)?(?:\*\*)?(en|vi)\s*:(?:\*\*)?\s*(.*)$/gim;

            let currentEnText = "";
            let completePairCount = 0;
            let translationFailed = false;

            for (const match of reply2.matchAll(regex)) {
                const lang = match[1].toLowerCase();
                const sentence = match[2].trim();

                // An empty en: or vi: line is invalid
                if (!sentence) {
                    translationFailed = true;
                    continue;
                }

                if (lang === "en") {
                    // The previous English sentence did not receive a
                    // Vietnamese translation
                    if (currentEnText) {
                        translationFailed = true;
                    }

                    currentEnText = sentence;
                    continue;
                }

                if (lang === "vi") {
                    // Vietnamese appeared without an English sentence first
                    if (!currentEnText) {
                        translationFailed = true;
                        continue;
                    }

                    // Create one English/Vietnamese sentence pair
                    const sentenceWrapper = document.createElement("div");
                    sentenceWrapper.style.marginBottom = "8px";
                    sentenceWrapper.style.cursor = "pointer";

                    // English sentence
                    const enPara = document.createElement("div");
                    enPara.className = "markdown";
                    enPara.innerHTML = renderMarkdown(currentEnText);
                    enPara.style.margin = "0";

                    // Vietnamese sentence
                    const viPara = document.createElement("div");
                    viPara.className = "markdown";
                    viPara.innerHTML = renderMarkdown(sentence);
                    viPara.style.margin = "0";

                    // Put Vietnamese first when the user writes Vietnamese
                    const firstPara = vietnameseFirst ? viPara : enPara;
                    const secondPara = vietnameseFirst ? enPara : viPara;

                    // Show the main language
                    firstPara.style.display = "block";
                    firstPara.style.color = "inherit";

                    // Hide the translation at first
                    secondPara.style.display = "none";
                    secondPara.style.color = "#00ffff";

                    // Tap the sentence to show or hide its translation
                    sentenceWrapper.addEventListener("click", () => {
                        secondPara.style.display =
                            secondPara.style.display === "none"
                                ? "block"
                                : "none";
                    });

                    sentenceWrapper.appendChild(firstPara);
                    sentenceWrapper.appendChild(secondPara);
                    botMessage.appendChild(sentenceWrapper);

                    completePairCount++;
                    currentEnText = "";
                }
            }

            // An English sentence remained without Vietnamese
            if (currentEnText) {
                translationFailed = true;
            }

            // Gemini completely failed to produce any valid pairs
            if (completePairCount === 0) {
                translationFailed = true;
            }

            /*
             * Translation fallback:
             *
             * Show Gemini's original answer normally.
             * When the user taps it, show the translation error message.
             */
            if (translationFailed) {
                // Remove any incomplete translation pairs
                botMessage.innerHTML = "";
                botMessage.style.cursor = "pointer";

                // Show Gemini's original response
                const originalReply = document.createElement("div");
                originalReply.className = "markdown";
                originalReply.innerHTML = renderMarkdown(reply1);

                // Create the hidden error notice
                const translationError = document.createElement("div");
                translationError.className = "translation-error";
                translationError.textContent =
                    "Translation error. Please reload the page if it lasts too long.";

                translationError.style.display = "none";
                translationError.style.marginTop = "10px";
                translationError.style.padding = "8px 10px";
                translationError.style.borderRadius = "8px";
                translationError.style.color = "#ffb4ab";
                translationError.style.backgroundColor =
                    "rgba(255, 80, 80, 0.12)";

                botMessage.appendChild(originalReply);
                botMessage.appendChild(translationError);

                // Tap the original answer to show or hide the error notice
                botMessage.addEventListener("click", event => {
                    // Allow links inside markdown to work normally
                    if (event.target.closest("a")) {
                        return;
                    }

                    translationError.style.display =
                        translationError.style.display === "none"
                            ? "block"
                            : "none";
                });
            }

            // Replace "Thinking..." with the final message
            thinkingMessage.replaceWith(botMessage);

            window.scrollTo(0, document.body.scrollHeight);
        } catch (error) {
            console.error(error);

            const errorMessage = document.createElement("div");
            errorMessage.className = "bot";
            errorMessage.style.color = "red";
            errorMessage.textContent =
                "Error: Could not connect to API.";

            thinkingMessage.replaceWith(errorMessage);
        }
    } finally {
        isSending = false;
    }
}

</script>

</body>
</html>
