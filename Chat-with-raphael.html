<script src="https://cdn.jsdelivr.net/npm/marked@18.0.6/lib/marked.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.4.12/dist/purify.min.js"></script>
<script>


window.RAPHAEL_API_BASE = window.RAPHAEL_API_BASE || "https://raphael-chat-backend.onrender.com";

const SESSION_STORAGE_KEY = "raphael_session_id";
const SETTINGS_PASSWORD = "1234";
let backendReady = false;
let isSending = false;
let settingsSwitchQueue = Promise.resolve();

function generateSessionId() {
    if (window.crypto && typeof window.crypto.randomUUID === "function") {
        return window.crypto.randomUUID();
    }

    if (window.crypto && typeof window.crypto.getRandomValues === "function") {
        const bytes = new Uint8Array(16);
        window.crypto.getRandomValues(bytes);
        return Array.from(bytes, byte =>
            byte.toString(16).padStart(2, "0")
        ).join("");
    }

    return (
        Date.now().toString(36) +
        Math.random().toString(36).slice(2) +
        Math.random().toString(36).slice(2)
    );
}

function getSessionId() {
    try {
        let storedId = sessionStorage.getItem(SESSION_STORAGE_KEY);

        if (!storedId) {
            storedId = generateSessionId();
            sessionStorage.setItem(SESSION_STORAGE_KEY, storedId);
        }

        return storedId;
    } catch (error) {
        // The chat still works if browser storage is unavailable, but a page
        // reload will create a fresh anonymous session.
        return generateSessionId();
    }
}

const sessionId = getSessionId();

async function fetchWithTimeout(url, options = {}, timeoutMs = 120000) {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), timeoutMs);

    try {
        return await fetch(url, {
            ...options,
            signal: controller.signal
        });
    } finally {
        clearTimeout(timeoutId);
    }
}

function setBackendButtonsDisabled(disabled) {
    [
        "send-btn",
        "apply-settings-btn",
        "new-chat-btn",
        "auto-start-btn",
        "next-vocab-btn"
    ].forEach(id => {
        const button = document.getElementById(id);
        if (button) button.disabled = disabled;
    });
}

function renderMarkdown(text) {
    if (!window.marked || !window.DOMPurify) {
        return null;
    }

    marked.setOptions({
        gfm: true,
        breaks: true
    });

    return DOMPurify.sanitize(marked.parse(text));
}

function setMessageContent(element, speaker, text, useMarkdown) {
    element.replaceChildren();

    const speakerLabel = document.createElement("span");
    speakerLabel.className = "message-speaker";
    speakerLabel.textContent = speaker + ":";
    element.appendChild(speakerLabel);

    if (useMarkdown) {
        const renderedHtml = renderMarkdown(text);

        if (renderedHtml !== null) {
            const content = document.createElement("div");
            content.className = "markdown-body";
            content.innerHTML = renderedHtml;

            content.querySelectorAll("a").forEach(link => {
                link.target = "_blank";
                link.rel = "noopener noreferrer";
            });

            element.appendChild(content);
            return;
        }
    }

    const plainText = document.createElement("span");
    plainText.textContent = text;
    element.appendChild(plainText);
}

function appendMessage(className, speaker, text) {
    const chatBox = document.getElementById("chat-box");

    const div = document.createElement("div");
    div.className = className;
    div.dataset.copyText = text;

    const span = document.createElement("div");
    span.className = "msg-text";
    setMessageContent(span, speaker, text, className.includes("bot"));

    const copyBtn = document.createElement("button");
    copyBtn.className = "copy-btn";
    copyBtn.textContent = "Copy";
    copyBtn.onclick = function() {
        copyMessage(copyBtn);
    };

    const speakBtn = document.createElement("button");
    speakBtn.className = "speak-btn";
    speakBtn.textContent = "Play";
    speakBtn.onclick = function() {
        speakMessage(speakBtn);
    };

    div.appendChild(span);
    div.appendChild(copyBtn);
    div.appendChild(speakBtn);

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;

}

    function setMessage(div, speaker, text) {
        div.dataset.copyText = text;
        const span = div.querySelector(".msg-text");
        if (span) {
            setMessageContent(span, speaker, text, div.classList.contains("bot"));
        }
    }

    async function copyMessage(button) {
        const div = button.parentElement;
        const text = div.dataset.copyText || "";

        try {
            await navigator.clipboard.writeText(text);
            const oldText = button.textContent;
            button.textContent = "Copied";
            setTimeout(() => {
                button.textContent = oldText;
            }, 1000);
        } catch (e) {
            const textarea = document.createElement("textarea");
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand("copy");
            document.body.removeChild(textarea);

            const oldText = button.textContent;
            button.textContent = "Copied";
            setTimeout(() => {
                button.textContent = oldText;
            }, 1000);
        }
    }


  

    async function sendMessage() {
        if (isSending || !backendReady) return;

        const input = document.getElementById("message");
        const sendButton = document.getElementById("send-btn");
        const message = input.value.trim();
        if (message === "") return;

        isSending = true;
        sendButton.disabled = true;

        appendMessage("user", "You", message);
        input.value = "";

        const botDiv = appendMessage("bot", "Raphael", "thinking...");

        try {
            const response = await fetchWithTimeout(`${window.RAPHAEL_API_BASE}/send`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    session_id: sessionId,
                    message: message
                })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.reply || `Server error: ${response.status}`);
            }

            setMessage(botDiv, "Raphael", data.reply || "No response");

        } catch (error) {
            let errorMsg = error.name === "AbortError" ? "Request timeout" : error.message;
            botDiv.classList.add("error");
            setMessage(botDiv, "Raphael", "❌ Error: " + errorMsg);
        } finally {
            isSending = false;
            sendButton.disabled = false;
        }
    }

    async function applySettings(silent = false, systemInstructionOverride = null) {
        const settings = {
            session_id: sessionId,
            model_name: document.getElementById("model_name").value.trim(),
            system_instruction: systemInstructionOverride ??
                document.getElementById("system_instruction").value.trim(),
            temperature: document.getElementById("temperature").value,
            max_output_tokens: document.getElementById("max_output_tokens").value,
        };

        try {
            const response = await fetchWithTimeout(
                `${window.RAPHAEL_API_BASE}/settings`,
                {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify(settings)
                }
            );

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.reply || `Server error: ${response.status}`);
            }

            backendReady = true;

            if (!silent) {
                setBackendButtonsDisabled(false);
                document.getElementById("send-btn").textContent = "Send";
                appendMessage("bot", "System", data.reply || "Settings applied.");
            }

            return true;

        } catch (error) {
            const errorMessage = error.name === "AbortError"
                ? "Render wake-up timed out."
                : error.message;

            if (!silent) {
                appendMessage("bot error", "System", "❌ " + errorMessage);
            }

            return false;
        }
    }

    function queueSystemInstruction(systemInstructionOverride = null) {
        settingsSwitchQueue = settingsSwitchQueue.then(() =>
            applySettings(true, systemInstructionOverride)
        );

        return settingsSwitchQueue;
    }

    async function newChat() {
        if (!backendReady) return;

        try {
            const response = await fetchWithTimeout(
                `${window.RAPHAEL_API_BASE}/new_chat`,
                {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({session_id: sessionId})
                }
            );

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.reply || `Server error: ${response.status}`);
            }

            stopSpeaking();
            document.getElementById("chat-box").innerHTML = "";
            
            appendMessage(
    "bot status-message",
    "Raphael",
    data.reply || "New chat started."
);

        } catch (error) {
            const errorMessage = error.name === "AbortError"
                ? "Request timeout"
                : error.message;
            appendMessage("bot error", "System", "❌ " + errorMessage);
        }
    }

    function toggleSettings() {
        const panel = document.getElementById("settings-panel");

        if (getComputedStyle(panel).display !== "none") {
            panel.style.display = "none";
            return;
        }

        const password = window.prompt("Type password:");

        if (password === null) return;

        if (password === SETTINGS_PASSWORD) {
            panel.style.display = "block";
        } else {
            window.alert("Incorrect password.");
        }
    }



function detectLang(text) {
    const vietnameseChars = /[àáạảãâầấậẩẫăằắặẳẵèéẹẻẽêềếệểễìíịỉĩòóọỏõôồốộổỗơờớợởỡùúụủũưừứựửữỳýỵỷỹđ]/i;

    if (vietnameseChars.test(text)) {
        return "vi-VN";
    }

    return "en-US";
}

function cleanForSpeech(text) {
    return text
        .replace(/\*+/g, "")
        .replace(/`/g, "")
        .replace(/\#+/g, "")
        .trim();
}

function hasReadableText(text) {
    if (/[a-zA-Z0-9]/.test(text)) {
        return true;
    }

    const vietnameseChars = /[àáạảãâầấậẩẫăằắặẳẵèéẹẻẽêềếệểễìíịỉĩòóọỏõôồốộổỗơờớợởỡùúụủũưừứựửữỳýỵỷỹđ]/i;

    if (vietnameseChars.test(text)) {
        return true;
    }

    return false;
}

function pushNormalPart(parts, text) {
    const cleanText = cleanForSpeech(text);

    if (cleanText === "") return;
    if (!hasReadableText(cleanText)) return;

    parts.push({
        text: cleanText,
        lang: detectLang(cleanText)
    });
}

function pushEnglishPart(parts, text) {
    const cleanText = cleanForSpeech(text);

    if (cleanText === "") return;
    if (!hasReadableText(cleanText)) return;

    parts.push({
        text: cleanText,
        lang: "en-US"
    });
}

function splitTextByLang(text) {
    const parts = [];
    const regex = /\[\[([\s\S]*?)\]\]/g;

    let lastIndex = 0;
    let match;

    while ((match = regex.exec(text)) !== null) {
        const beforeText = text.slice(lastIndex, match.index);
        pushNormalPart(parts, beforeText);

        const englishText = match[1];
        pushEnglishPart(parts, englishText);

        lastIndex = regex.lastIndex;
    }

    const afterText = text.slice(lastIndex);
    pushNormalPart(parts, afterText);

    return parts;
}

let currentSpeakButton = null;
let speakId = 0;

function speakMessage(button) {
    const div = button.parentElement;
    const text = div.dataset.copyText || "";

    if (text.trim() === "") return;

    if (speechSynthesis.speaking && currentSpeakButton === button) {
        speakId++;
        speechSynthesis.cancel();

        button.textContent = "Play";
        currentSpeakButton = null;

        return;
    }

    speakId++;
    speechSynthesis.cancel();

    if (currentSpeakButton) {
        currentSpeakButton.textContent = "Play";
    }

    button.textContent = "Stop";
    currentSpeakButton = button;

    const mySpeakId = speakId;
    const parts = splitTextByLang(text);

    let index = 0;

    function speakNextPart() {
        if (mySpeakId !== speakId) return;

        if (index >= parts.length) {
            button.textContent = "Play";
            currentSpeakButton = null;
            return;
        }

        const part = parts[index];
        index++;

        const speech = new SpeechSynthesisUtterance(part.text);

        speech.lang = part.lang;
        speech.rate = 1;
        speech.pitch = 1;

        if (part.lang === "vi-VN") {
            speech.volume = 1;
        } else {
            speech.volume = 0.75;
        }

        speech.onend = function() {
            speakNextPart();
        };

        speech.onerror = function() {
            speakNextPart();
        };

        speechSynthesis.speak(speech);
    }

    speakNextPart();
}

/*
Reusable function for listen.js.
It speaks plain text and then runs a callback when finished.
*/
function speakPlainText(text, onFinished) {
    
    speakId++;
    speechSynthesis.cancel();
    const mySpeakId = speakId;
    const parts = splitTextByLang(text);
    let index = 0;
    
    function speakNext() {
       if (mySpeakId !== speakId) return;

        if (index >= parts.length) {
            if (onFinished) onFinished();
            return;
        }

        const part = parts[index];
          index++;
        const speech = new SpeechSynthesisUtterance(part.text);

        speech.lang = part.lang;
        speech.rate = 1;
        speech.pitch = 1;

        if (part.lang === "vi-VN") {
            speech.volume = 1;
        } else {
            speech.volume = 0.75;
        }
        speech.onend = speakNext;
        speech.onerror = speakNext;

        speechSynthesis.speak(speech);
    }

    speakNext();
}

function stopSpeaking() {
    speakId++;
    speechSynthesis.cancel();

    if (currentSpeakButton) {
        currentSpeakButton.textContent = "Play";
        currentSpeakButton = null;
    }
}

let autoMode = false;
let isLoading = false;
let currentRound = 0;
let vocabController = null;
let vocabSession = null;

function setStatus(text) {
    document.getElementById("vocabStatus").textContent = "Status: " + text;
}

function getRandomItem(list) {
    const randomIndex = Math.floor(Math.random() * list.length);
    return list[randomIndex];
}

function shuffleItems(list) {
    const shuffledItems = [...list];

    for (let i = shuffledItems.length - 1; i > 0; i--) {
        const randomIndex = Math.floor(Math.random() * (i + 1));
        [shuffledItems[i], shuffledItems[randomIndex]] =
            [shuffledItems[randomIndex], shuffledItems[i]];
    }

    return shuffledItems;
}

function getVocabSettings() {
    const vocabText = document.getElementById("vocabList").value;
    const promptText = document.getElementById("promptList").value;
    const wordCount = Number(document.getElementById("wordCount").value);
    const againCount = Number(document.getElementById("againCount").value);

    const vocabList = Array.from(new Set(
        vocabText.split("\n").map(v => v.trim()).filter(v => v !== "")
    ));
    const promptList = promptText.split("\n").map(v => v.trim()).filter(v => v !== "");

    if (vocabList.length === 0) throw new Error("Vocabulary list is empty");
    if (promptList.length === 0) throw new Error("Prompt list is empty");
    if (!Number.isInteger(wordCount) || wordCount < 1) {
        throw new Error("Words per round must be a whole number of at least 1");
    }
    if (!Number.isInteger(againCount) || againCount < 1) {
        throw new Error("Again must be a whole number of at least 1");
    }

    return { vocabList, promptList, wordCount, againCount };
}

function updateVocabPlan() {
    const plan = document.getElementById("vocabPlan");
    const vocabText = document.getElementById("vocabList").value;
    const uniqueWords = Array.from(new Set(
        vocabText.split("\n").map(v => v.trim()).filter(v => v !== "")
    ));
    const wordCount = Number(document.getElementById("wordCount").value);
    const againCount = Number(document.getElementById("againCount").value);

    if (uniqueWords.length === 0) {
        plan.textContent = "Add vocabulary to see how many rounds will run.";
        return;
    }

    if (!Number.isInteger(wordCount) || wordCount < 1 ||
        !Number.isInteger(againCount) || againCount < 1) {
        plan.textContent = "Words per round and Again must be whole numbers of at least 1.";
        return;
    }

    const roundsPerRun = Math.ceil(uniqueWords.length / wordCount);
    const lastRoundWords = uniqueWords.length % wordCount || Math.min(wordCount, uniqueWords.length);
    const totalRounds = roundsPerRun * againCount;
    const wordLabel = lastRoundWords === 1 ? "word" : "words";

    plan.textContent =
        `${uniqueWords.length} unique words = ${roundsPerRun} rounds per list run ` +
        `(the last round has ${lastRoundWords} ${wordLabel}). ` +
        `Again ${againCount} = ${totalRounds} rounds total.`;
}

function prepareVocabSession() {
    const settings = getVocabSettings();
    const roundsPerRun = Math.ceil(settings.vocabList.length / settings.wordCount);

    vocabSession = {
        ...settings,
        currentRun: 1,
        roundInRun: 0,
        roundsPerRun,
        totalRounds: roundsPerRun * settings.againCount,
        remainingWords: shuffleItems(settings.vocabList)
    };

    currentRound = 0;
    updateVocabPlan();
}

function takeNextWordBatch() {
    if (!vocabSession) return null;

    if (vocabSession.remainingWords.length === 0) {
        if (vocabSession.currentRun >= vocabSession.againCount) return null;

        vocabSession.currentRun++;
        vocabSession.roundInRun = 0;
        vocabSession.remainingWords = shuffleItems(vocabSession.vocabList);
    }

    vocabSession.roundInRun++;
    currentRound++;

    return vocabSession.remainingWords.splice(0, vocabSession.wordCount);
}

function buildPrompt(words) {
    const prompt = getRandomItem(vocabSession.promptList);

    return prompt + "\n\n" + words.join("\n");
}


function showVocabReply(prompt, aiReply, words) {
    lastRoundDisplay = {
        prompt,
        aiReply,
        words: [...words]
    };

    const storyBox = document.getElementById("storyBox");
    storyBox.replaceChildren();

    // Always display the round
    const roundTitle = document.createElement("h3");
    roundTitle.textContent =
        `Round ${currentRound} of ${vocabSession.totalRounds} · ` +
        `List run ${vocabSession.currentRun} of ${vocabSession.againCount}`;

    storyBox.appendChild(roundTitle);

    // Always display the current vocabulary
    const wordList = document.createElement("div");
    wordList.className = "current-vocab-list";
    wordList.textContent = words.join("\n");
    storyBox.appendChild(wordList);

    // OFF: stop here, hiding the prompt and story
    if (!showPromptAndStory) return;

    const separator = document.createElement("hr");
    storyBox.appendChild(separator);

    const promptTitle = document.createElement("strong");
    promptTitle.textContent = "PROMPT:";
    storyBox.appendChild(promptTitle);

    const promptText = document.createElement("pre");
    promptText.textContent = prompt;
    storyBox.appendChild(promptText);

    const storySeparator = document.createElement("hr");
    storyBox.appendChild(storySeparator);

    const storyTitle = document.createElement("strong");
    storyTitle.textContent = "STORY:";
    storyBox.appendChild(storyTitle);

    const reply = document.createElement("div");
    reply.className = "markdown-body";

    if (aiReply === null) {
        reply.textContent = "Generating story...";
    } else {
        const renderedHtml = renderMarkdown(aiReply);

        if (renderedHtml !== null) {
            reply.innerHTML = renderedHtml;

            reply.querySelectorAll("a").forEach(link => {
                link.target = "_blank";
                link.rel = "noopener noreferrer";
            });
        } else {
            reply.textContent = aiReply;
        }
    }

    storyBox.appendChild(reply);
}




async function startAutoVocab() {
    if (autoMode) return;
    if (!backendReady) {
        setStatus("Raphael is still waking up");
        return;
    }

    try {
        prepareVocabSession();
    } catch (error) {
        setStatus("error — " + error.message);
        return;
    }

    autoMode = true;
    setStatus(`started — ${vocabSession.totalRounds} rounds total`);

    await nextVocabRound();
}

function stopAutoVocab() {
    autoMode = false;

    if (vocabController) {
        vocabController.abort();
    }

    stopSpeaking();
    setStatus("stopped");
}

async function nextVocabRound() {
    if (isLoading) return;
    if (!backendReady) {
        setStatus("Raphael is still waking up");
        return;
    }

    isLoading = true;
    const startedByAuto = autoMode;
    let timeoutId = null;

    try {
        if (!vocabSession || (currentRound >= vocabSession.totalRounds && !autoMode)) {
            prepareVocabSession();
        }

        const words = takeNextWordBatch();

        if (!words) {
            autoMode = false;
            setStatus(
                `completed — ${vocabSession.totalRounds} rounds, ` +
                `${vocabSession.againCount} complete list runs`
            );
            return;
        }

        const prompt = buildPrompt(words);

showVocabReply(prompt, null, words);


        document.getElementById("storyBox").textContent =
            `Round ${currentRound} of ${vocabSession.totalRounds}\n` +
            `List run ${vocabSession.currentRun} of ${vocabSession.againCount}\n\nLoading...`;

        vocabController = new AbortController();
        timeoutId = setTimeout(() => vocabController.abort(), 120000);

        const response = await fetch(`${window.RAPHAEL_API_BASE}/send`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                session_id: sessionId,
                message: prompt
            }),
            signal: vocabController.signal
        });

        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.reply || `Server error: ${response.status}`);
        }

        if (startedByAuto && !autoMode) return;

        const aiReply = data.reply || "No reply.";

       showVocabReply(prompt, aiReply, words); 
        

        speakPlainText(aiReply, function () {
            if (autoMode) {
                nextVocabRound();
            }
        });

    } catch (error) {
        if (error.name === "AbortError" && !autoMode) {
            document.getElementById("storyBox").textContent = "Stopped.";
            setStatus("stopped");
        } else {
            autoMode = false;
            const errorMessage = error.name === "AbortError"
                ? "Request timeout"
                : error.message;
            document.getElementById("storyBox").textContent =
                "Error: " + errorMessage;
            setStatus("error");
        }
    } finally {
        if (timeoutId !== null) clearTimeout(timeoutId);
        vocabController = null;
        isLoading = false;
    }
}


let showPromptAndStory = false;
let lastRoundDisplay = null;

function toggleStorySetting() {
    showPromptAndStory = !showPromptAndStory;

    document.getElementById("story-setting-btn").textContent =
        showPromptAndStory
            ? "Prompt & Story: ON"
            : "Prompt & Story: OFF";

    // Immediately redraw the current round if one already exists
    if (lastRoundDisplay) {
        showVocabReply(
            lastRoundDisplay.prompt,
            lastRoundDisplay.aiReply,
            lastRoundDisplay.words
        );
    }
}




async function listen() {
    document.getElementById("settings-panel").style.display = "none";
    document.getElementById("chat-box").style.display = "none";
    document.getElementById("input-area").style.display = "none";
    document.getElementById("toggle").style.display = "none";
    document.getElementById("listen-toggle").style.display = "none";
     
    document.getElementById("listen-panel").style.display = "block";
    
    document.getElementById("storyBox").style.display = "block";;

    const autoStartButton = document.getElementById("auto-start-btn");
    const nextButton = document.getElementById("next-vocab-btn");
    autoStartButton.disabled = true;
    nextButton.disabled = true;
    setStatus("loading listening instructions...");

    const listeningInstruction =
        document.getElementById("listening_system_instruction").value.trim();
    const success = await queueSystemInstruction(listeningInstruction);

    if (success) {
        autoStartButton.disabled = false;
        nextButton.disabled = false;
        setStatus("ready");
    } else {
        setStatus("could not load listening instructions");
    }
}

async function back() {
    stopAutoVocab();
    document.getElementById("listen-panel").style.display = "none";
    document.getElementById("storyBox").style.display = "none";

    document.getElementById("settings-panel").style.display = "none";
    document.getElementById("chat-box").style.display = "block";
    document.getElementById("input-area").style.display = "flex";
    document.getElementById("toggle").style.display = "inline-block";
    document.getElementById("listen-toggle").style.display = "inline-block";

    backendReady = false;
    setBackendButtonsDisabled(true);
    document.getElementById("send-btn").textContent = "Restoring...";

    const success = await queueSystemInstruction();

    if (success) {
        setBackendButtonsDisabled(false);
        document.getElementById("send-btn").textContent = "Send";
    } else {
        document.getElementById("apply-settings-btn").disabled = false;
        document.getElementById("send-btn").textContent = "Unavailable";
        appendMessage(
            "bot error",
            "System",
            "❌ Could not restore normal chat settings. Open Settings and press Apply Settings."
        );
    }
}

async function initializeRaphael() {
    const sendButton = document.getElementById("send-btn");
    const applyButton = document.getElementById("apply-settings-btn");
    const startupMessage = document.getElementById("startup-message");

    setBackendButtonsDisabled(true);
    sendButton.textContent = "Waking...";

    const success = await applySettings(true);

    if (success) {
        setMessage(
            startupMessage,
            "Raphael",
            "Affirmative. System ready."
        );
        setBackendButtonsDisabled(false);
        sendButton.textContent = "Send";
    } else {
        startupMessage.classList.add("error");
        setMessage(
            startupMessage,
            "Raphael",
            "❌ Wake-up failed. Open Settings and press Apply Settings to retry."
        );

        // Only the retry button is usable until initialization succeeds.
        applyButton.disabled = false;
        sendButton.textContent = "Unavailable";
    }
}

window.addEventListener("DOMContentLoaded", function () {
    document.getElementById("vocabList").addEventListener("input", updateVocabPlan);
    document.getElementById("wordCount").addEventListener("input", updateVocabPlan);
    document.getElementById("againCount").addEventListener("input", updateVocabPlan);
    updateVocabPlan();
    initializeRaphael();
});
