    <script>    

function removePunctuation(text) {
    return text
        .replace(
            /(?<![\p{L}\p{M}\p{N}])['’\-‐]|['’\-‐](?![\p{L}\p{M}\p{N}])/gu,
            " "
        )
        .replace(
            /(?<!\p{N})[.,]|[.,](?!\p{N})/gu,
            " "
        )
        .replace(
            /[^\p{L}\p{M}\p{N}\s'’\-‐.,]/gu,
            " "
        )
        .replace(/\s+/gu, " ")
        .trim();
}



function compareTexts(text1, text2) {
    // Clean and convert each text into an array of lowercase words
    const words1 = removePunctuation(text1)
        .toLowerCase()
        .split(/\s+/)
        .filter(Boolean);

    const words2 = removePunctuation(text2)
        .toLowerCase()
        .split(/\s+/)
        .filter(Boolean);

    // Sets make word comparison faster
    const set1 = new Set(words1);
    const set2 = new Set(words2);

    // Words appearing in both texts
    const matchedWords = [...set1].filter(word => set2.has(word));

    // Words appearing only in text 1
    const onlyText1 = [...set1].filter(word => !set2.has(word));

    // Words appearing only in text 2
    const onlyText2 = [...set2].filter(word => !set1.has(word));

    return {
        matchedWords,
        onlyText1,
        onlyText2
    };
}
// they're all array.


function countWords(text) {
    const cleanedText = removePunctuation(text);

    if (!cleanedText) return 0;

    return cleanedText
        .split(/\s+/)
        .filter(Boolean)
        .length;
}

function addWordCounter(textareaId, paragraphId) {
    const textarea = document.getElementById(textareaId);
    const paragraph = document.getElementById(paragraphId);

    function updateCounter() {
        const total = countWords(textarea.value);
        paragraph.textContent = `${total} words`;
    }

    textarea.addEventListener("input", updateCounter);

    // Show the initial count
    updateCounter();

    // Return the function so it can be called manually
    return updateCounter;
}

function copyText(btnElement, targetId) {
    const textToCopy = document.getElementById(targetId).value;

    navigator.clipboard.writeText(textToCopy)
        .then(() => {
            // Change it to "Copied!"
            btnElement.textContent = "Copied!";
            
            // Revert it to exactly "Copy" after 2 seconds
            setTimeout(() => {
                btnElement.textContent = "Copy"; 
            }, 2000);
        })
        .catch(err => {
            console.error("Failed to copy text: ", err);
        });
}

function linkInputs(i, t) {
    const inputField = document.getElementById(i);
    const textArea = document.getElementById(t);

    if (inputField && textArea) {
        inputField.addEventListener("input", () => {
            textArea.value = inputField.value;

            textArea.dispatchEvent(
                new Event("input", {
                    bubbles: true
                })
            );
        });
    }
}


// Call this function when the page loads
linkInputs("i1","t1");
linkInputs("i2","t2");


function toggle(button, id) {
    const element = document.getElementById(id);
    
    const isHidden = element.style.display === "none";

    element.style.display = isHidden ? "" : "none";
    button.textContent = isHidden ? "Hide" : "click here if you can't paste your text";
}

toggle(document.getElementById("tg1"), "i1");
toggle(document.getElementById("tg2"), "i2");
toggle(document.getElementById("tg1"), "ip1");
toggle(document.getElementById("tg2"), "ip2");

function importTxtFile(targetId) {
    const target = document.getElementById(targetId);

    if (!target) {
        console.error(`Element "${targetId}" was not found.`);
        return;
    }

    const fileInput = document.createElement("input");

    fileInput.type = "file";
    fileInput.accept = ".txt,text/plain";

    fileInput.addEventListener("change", async () => {
        const file = fileInput.files[0];

        if (!file) return;

        try {
            target.value = await file.text();

            target.dispatchEvent(
                new Event("input", {
                    bubbles: true
                })
            );
        } catch (error) {
            console.error("Could not read the file:", error);
            alert("Could not read this TXT file.");
        }
    });

    fileInput.click();
}
